steps:
  # 1. On active l'API Cloud Functions (déjà fait, mais on la garde par sécurité)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args: ['gcloud', 'services', 'enable', 'cloudfunctions.googleapis.com']

  # 2. 🌟 NOUVEAU : On active l'API Cloud Resource Manager pour valider les permissions
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args: ['gcloud', 'services', 'enable', 'cloudresourcemanager.googleapis.com']

  # 3. Ton étape de déploiement habituelle
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'functions'
      - 'deploy'
      - 'nutria_api'
      - '--runtime=python311'
      - '--trigger-http'
      - '--allow-unauthenticated'
      - '--region=europe-west1'
      - '--entry-point=nutria_api'
    dir: 'backend-python'

options:
  logging: CLOUD_LOGGING_ONLY